<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" role="img" aria-label="Harness multi-agente para spec-driven development">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <radialGradient id="glow2" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#22d3ee"/>
    </marker>
  </defs>

  <rect width="800" height="480" fill="url(#bg2)"/>
  <rect width="800" height="480" fill="url(#glow2)"/>

  <!-- pipeline: 6 nodos -->
  <g font-family="ui-sans-serif,system-ui,Arial" font-size="20" font-weight="600" text-anchor="middle">
    <!-- fila 1 -->
    <g>
      <rect x="70"  y="150" width="180" height="64" rx="16" fill="#0b1220" stroke="#22d3ee" stroke-width="2.5"/>
      <text x="160" y="190" fill="#e2e8f0">Planner</text>
      <rect x="310" y="150" width="180" height="64" rx="16" fill="#0b1220" stroke="#22d3ee" stroke-width="2.5"/>
      <text x="400" y="190" fill="#e2e8f0">Architect</text>
      <rect x="550" y="150" width="180" height="64" rx="16" fill="#0b1220" stroke="#22d3ee" stroke-width="2.5"/>
      <text x="640" y="190" fill="#e2e8f0">Implementer</text>
    </g>
    <!-- fila 2 -->
    <g>
      <rect x="70"  y="290" width="180" height="64" rx="16" fill="#0b1220" stroke="#22d3ee" stroke-width="2.5"/>
      <text x="160" y="330" fill="#e2e8f0">Tester</text>
      <rect x="310" y="290" width="180" height="64" rx="16" fill="#0b1220" stroke="#22d3ee" stroke-width="2.5"/>
      <text x="400" y="330" fill="#e2e8f0">Reviewer</text>
      <rect x="550" y="290" width="180" height="64" rx="16" fill="#22d3ee" stroke="#22d3ee" stroke-width="2.5"/>
      <text x="640" y="330" fill="#0f172a">Integrator</text>
    </g>
  </g>

  <!-- conexiones -->
  <g fill="none" stroke="#22d3ee" stroke-width="2.5" marker-end="url(#arrow)">
    <line x1="250" y1="182" x2="305" y2="182"/>
    <line x1="490" y1="182" x2="545" y2="182"/>
    <path d="M640,214 C640,250 160,250 160,286"/>
    <line x1="250" y1="322" x2="305" y2="322"/>
    <line x1="490" y1="322" x2="545" y2="322"/>
  </g>

  <text x="400" y="430" text-anchor="middle" fill="#64748b" font-family="ui-sans-serif,system-ui,Arial" font-size="17" letter-spacing="2">Claude · Codex · Gemini · Copilot — gates de calidad por spec</text>
</svg>
