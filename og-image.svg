<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="1" stop-color="#0b1220"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.15" r="0.7">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.08" cy="0.95" r="0.6">
      <stop offset="0" stop-color="#3b82f6" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#1e293b" stroke-opacity="0.45" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- marco sutil -->
  <rect x="20" y="20" width="1160" height="590" rx="24" fill="none" stroke="#22d3ee" stroke-opacity="0.18" stroke-width="2"/>

  <!-- eyebrow con punto de estado -->
  <circle cx="92" cy="150" r="7" fill="#22d3ee"/>
  <text x="112" y="157" font-family="JetBrains Mono, DejaVu Sans Mono, monospace" font-size="22" letter-spacing="5" fill="#67e8f9">BACKEND · PLATFORM · DEVOPS</text>

  <!-- nombre -->
  <text x="90" y="320" font-family="Bricolage Grotesque, DejaVu Sans, sans-serif" font-weight="800" font-size="104" fill="#ffffff">Jesús Pérez Bañobre</text>

  <!-- subtítulo -->
  <text x="92" y="392" font-family="Hanken Grotesk, DejaVu Sans, sans-serif" font-weight="500" font-size="40" fill="#cbd5e1">Platform Engineer · Kubernetes · Entrega continua</text>

  <!-- línea de acento -->
  <rect x="92" y="440" width="120" height="5" rx="2.5" fill="#22d3ee"/>

  <!-- chips de stack -->
  <g font-family="Hanken Grotesk, DejaVu Sans, sans-serif" font-size="26" fill="#e2e8f0">
    <rect x="92" y="486" width="170" height="58" rx="29" fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>
    <text x="177" y="523" text-anchor="middle">Node.js</text>
    <rect x="278" y="486" width="200" height="58" rx="29" fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>
    <text x="378" y="523" text-anchor="middle">Kubernetes</text>
    <rect x="494" y="486" width="200" height="58" rx="29" fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>
    <text x="594" y="523" text-anchor="middle">PostgreSQL</text>
    <rect x="710" y="486" width="180" height="58" rx="29" fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>
    <text x="800" y="523" text-anchor="middle">Terraform</text>
  </g>

  <!-- dominio -->
  <text x="1110" y="157" text-anchor="end" font-family="JetBrains Mono, DejaVu Sans Mono, monospace" font-size="26" fill="#94a3b8">ketaloca.dev</text>
</svg>
